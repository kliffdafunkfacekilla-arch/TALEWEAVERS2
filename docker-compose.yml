services:
  # Mechanics Engines (Stateless)
  saga-character-engine:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_character_engine
    ports:
      - "8003:8003"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8003"]

  saga-item-engine:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_item_engine
    ports:
      - "8005:8005"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8005"]

  saga-skill-engine:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_skill_engine
    ports:
      - "8006:8006"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8006"]

  saga-clash-engine:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_clash_engine
    ports:
      - "8007:8007"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8007"]

  # World & Lore
  saga-lore-module:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_lore_module
    ports:
      - "8001:8001"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]

  saga-architect:
    build:
      context: .
      dockerfile: saga_architect/Dockerfile
    ports:
      - "8012:8012"

  saga-chronos:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_chronos
    ports:
      - "8004:8004"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8004"]

  saga-encounter-engine:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_encounter_engine
    ports:
      - "8009:8009"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8009"]

  # Orchestration
  saga-campaign-weaver:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_campaign_weaver
    ports:
      - "8010:8010"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8010"]

  saga-director:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        - SERVICE_DIR=saga_director
    ports:
      - "8000:8000"
    environment:
      - CHAR_ENGINE_URL=http://saga-character-engine:8003
      - ITEM_FOUNDRY_URL=http://saga-item-engine:8005
      - CLASH_ENGINE_URL=http://saga-clash-engine:8007
      - ENCOUNTER_ENGINE_URL=http://saga-encounter-engine:8009
      - CAMPAIGN_WEAVER_URL=http://saga-campaign-weaver:8010
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - saga-character-engine
      - saga-item-engine
      - saga-clash-engine
      - saga-encounter-engine
      - saga-campaign-weaver

  # Frontend
  saga-vtt-client:
    build:
      context: .
      dockerfile: saga_vtt_client/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - saga-director
